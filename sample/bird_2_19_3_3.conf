# BIRD 2.19 and BIRD 3.3 syntax coverage sample

router id 192.0.2.44;

threads 4;
thread group worker {
  threads 2;
  default yes;
  max latency 250 ms;
  min time 1 ms;
  max time 10 ms;
  wakeup time 5 ms;
}

table master4 {
  cork threshold 1000;
  route refresh export settle time 100 ms;
  digest settle time 50 ms;
  thread group worker;
}

mpls domain core_mpls {
  label range static 1000 100;
  label range dynamic 2000 1000;
}

protocol bridge br0 {
  bridge device "br0";
  vlan filtering yes;
  kbr source RTS_STATIC;
}

protocol evpn fabric {
  encapsulation vxlan;
  vni 10010;
  vid 10;

  eth {
    import all;
    export all;
  };
}

protocol static static_aspa {
  aspa;
  route aspa 65000 providers 64496, 64497;
  route aspa 65001 transit providers 64498, 64499;
}

protocol bfd bfd_fast {
  express thread group worker;
  interface "eth0" {
    multiplier 3;
  };
}

protocol pipe pipe_refresh {
  max generation 8;
}

protocol bgp upstream {
  local as 65000;
  neighbor 2001:db8::1 as 64496;
  authentication ao;
  tx size warning 65535;

  ipv6 {
    export in 2001:db8::/32;
    export filter {
      if bgp_atomic_aggr then accept;
      if bgp_aggregator.asn = 64496 then accept;
      if bgp_aigp > 100 then reject;
      if bgp_pmsi_tunnel.len > 0 then accept;
      if bgp_otc = 64496 then reject;
      accept;
    };
  };
}

filter evpn_filter {
  filter stacks 128 256;

  if net.type = NET_ETH then accept;
  if net.type = NET_ASPA then reject;
  if net.type = NET_EVPN then {
    if net.evpn_type = NET_EVPN_MAC && net.vlan_id = 10 then accept;
    if net.evpn_type = NET_EVPN_IMET && net.router_ip = 192.0.2.1 then accept;
    if net.evpn_type = NET_EVPN_ES && net.evpn_esi.len > 0 then accept;
    if net.evpn_type = NET_EVPN_EAD && net.evpn_tag = 100 then accept;
  }

  if babel_metric > 0 then accept;
  if krt_prefsrc = 192.0.2.44 then accept;
  if radv_preference = 1 then accept;
  if radv_lifetime > 0 then accept;

  reject;
}
