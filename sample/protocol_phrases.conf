reload in upstream_1;
reload out upstream_1;
configure soft;
configure timeout 30;
configure soft timeout 30;
configure confirm;
configure undo;
configure status;
configure check "/etc/bird/bird.conf";
graceful restart;
restrict;
echo "bird ready";
enable upstream_1;
disable upstream_1;
restart upstream_1;
debug all;
mrtdump protocols all;
quit;
