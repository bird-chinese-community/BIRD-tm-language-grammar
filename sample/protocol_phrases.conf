timeformat iso long ms;
timeformat route iso long ms;
timeformat protocol iso short;
timeformat base iso;
timeformat log iso long ms;
debug show route all;
debug protocols all;
debug channels all;
debug tables all;
debug commands 2;

protocol static static_aspa {
  route aspa 65000 providers 64496, 64497;
}

protocol static static_routes {
  check link yes;
  igp table master4;
  route 203.0.113.0/24 recursive 192.0.2.254 mpls 16000;
  route 198.51.100.0/24 via 192.0.2.1 dev "eth0";
  route 198.51.101.0/24 via 192.0.2.1 mpls 16001/16002;
  route 198.51.102.0/24 via 192.0.2.1 onlink yes;
  route 198.51.103.0/24 via 192.0.2.1 bfd yes;
}

flow4 {
  next header = 6;
  icmp type = 8;
  icmp code = 0;
  tcp flags 0x02/0x02;
}
