minimum_prek_version: "0.3.0"
default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys]
        files: ^grammars/bird2\.tmLanguage\.json$

  - repo: local
    hooks:
      - id: bird2-tm-json-validate
        name: Validate tmLanguage JSON by jq
        language: system
        entry: bash -lc 'jq empty grammars/bird2.tmLanguage.json'
        pass_filenames: false
        files: ^grammars/bird2\.tmLanguage\.json$

      - id: bird2-grammar-coverage
        name: Check BIRD 2.19 / 3.3 grammar coverage
        language: system
        entry: node scripts/check-grammar-coverage.js
        pass_filenames: false
        files: ^(grammars/bird2\.tmLanguage\.json|scripts/(?:check-grammar-coverage|grammar-patterns)\.js)$

      - id: bird2-audit-cli-errors
        name: Check upstream audit CLI errors
        language: system
        entry: node scripts/check-audit-cli-errors.js
        pass_filenames: false
        files: ^scripts/(?:audit-upstream-grammar|check-audit-cli-errors)\.js$

      - id: bird2-install-smoke
        name: Check compatibility installer layout
        language: system
        entry: bash scripts/check-install.sh
        pass_filenames: false
        files: ^(scripts/(?:install|check-install)\.sh|external/(?:bird2\.vim|bird2\.nvim))$

      - id: bird2-vim-source-check
        name: Source Vim syntax files headlessly
        language: system
        entry: bash -lc 'vim -Nu NONE -n -es -c "set nomore" -c "source external/bird2.vim/syntax/bird2.vim" -c "source external/bird2.nvim/syntax/bird2.vim" -c "qa!"'
        pass_filenames: false
        files: ^external/(bird2\.vim|bird2\.nvim)/syntax/bird2\.vim$

      - id: bird2-vim-mirror-consistency
        name: Ensure BIRD.vim and BIRD.nvim syntax mirrors stay in sync
        language: system
        entry: bash -lc 'diff -u external/bird2.vim/syntax/bird2.vim external/bird2.nvim/syntax/bird2.vim'
        pass_filenames: false
        files: ^external/(bird2\.vim|bird2\.nvim)/syntax/bird2\.vim$

      - id: bird2-changesets
        name: Validate changelog changesets
        language: system
        entry: node scripts/changeset.mjs check
        pass_filenames: false
        files: ^(CHANGELOG\.md|\.changeset/|scripts/changeset\.mjs)$

      - id: commitlint
        name: Commit message lint (commitlint)
        language: node
        entry: commitlint --config commitlint.config.cjs --edit
        stages: [commit-msg]
        pass_filenames: true
        additional_dependencies:
          - '@commitlint/cli@19.8.0'
          - '@commitlint/config-conventional@19.8.0'
