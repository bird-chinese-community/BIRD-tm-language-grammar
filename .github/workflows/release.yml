name: Release grammars

on:
  push:
    branches: [ main ]
    paths:
      - 'grammars/bird2.tmLanguage.json'
      - 'grammars/bird2.syntax.vim'
      - 'external/bird2.vim'
      - 'external/bird2.vim/**'
      - '.gitmodules'
      # Re-run the release workflow when it changes, so fixes are validated.
      - '.github/workflows/release.yml'
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute release metadata
        id: meta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/release.js --gha-outputs

      - name: Create/Update TextMate release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TM_TAG: ${{ steps.meta.outputs.tm_tag }}
          TM_NAME: ${{ steps.meta.outputs.tm_name }}
          TM_BODY: ${{ steps.meta.outputs.tm_body }}
        run: |
          notes_file=$(mktemp)
          printf '%s' "$TM_BODY" > "$notes_file"
          if gh release view "$TM_TAG" --json tagName >/dev/null 2>&1; then
            gh release upload "$TM_TAG" grammars/bird2.tmLanguage.json --clobber
          else
            gh release create "$TM_TAG" \
              --target "$GITHUB_SHA" \
              --title "$TM_NAME" \
              --notes-file "$notes_file" \
              grammars/bird2.tmLanguage.json
          fi
          rm -f "$notes_file"

      - name: Create/Update Vim release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VIM_TAG: ${{ steps.meta.outputs.vim_tag }}
          VIM_NAME: ${{ steps.meta.outputs.vim_name }}
          VIM_BODY: ${{ steps.meta.outputs.vim_body }}
        run: |
          notes_file=$(mktemp)
          printf '%s' "$VIM_BODY" > "$notes_file"
          if gh release view "$VIM_TAG" --json tagName >/dev/null 2>&1; then
            gh release upload "$VIM_TAG" grammars/bird2.syntax.vim --clobber
          else
            gh release create "$VIM_TAG" \
              --target "$GITHUB_SHA" \
              --title "$VIM_NAME" \
              --notes-file "$notes_file" \
              grammars/bird2.syntax.vim
          fi
          rm -f "$notes_file"
